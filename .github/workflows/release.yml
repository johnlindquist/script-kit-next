name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  validate-version:
    name: Validate release version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify tag matches Cargo.toml version
        run: bash scripts/verify-release-version.sh

  validate-fmt:
    name: Validate release format
    runs-on: macos-14
    needs: validate-version
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Validate format
        run: bash scripts/verify.sh --skip-bundle --only fmt

  validate-check:
    name: Validate release check
    runs-on: macos-14
    needs: validate-version
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-debug"
          cache-targets: false
          save-if: false
      - name: Validate check
        run: bash scripts/verify.sh --skip-bundle --only check

  validate-clippy:
    name: Validate release clippy
    runs-on: macos-14
    needs: validate-version
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-debug"
          cache-targets: false
          save-if: false
      - name: Validate clippy
        run: bash scripts/verify.sh --skip-bundle --only clippy

  validate-test-compile:
    name: Validate release test compile
    runs-on: macos-14
    needs: validate-version
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      RUST_TEST_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-debug"
          cache-targets: false
          save-if: false
      - uses: taiki-e/install-action@nextest
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - name: Validate test compile
        run: bash scripts/verify.sh --skip-bundle --only test-compile

  validate-sdk-types:
    name: Validate release SDK types
    runs-on: macos-14
    needs: validate-version
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - name: Install JS dependencies
        run: bun install
      - name: Validate SDK types
        run: bash scripts/verify.sh --skip-bundle --only sdk-types

  validate-sdk-tests:
    name: Validate release SDK tests
    runs-on: macos-14
    needs: validate-version
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - name: Install JS dependencies
        run: bun install
      - name: Validate SDK tests
        run: bash scripts/verify.sh --skip-bundle --only sdk-tests

  validate-release-gates:
    name: Validate release gates
    runs-on: ubuntu-latest
    if: ${{ always() }}
    needs:
      - validate-version
      - validate-fmt
      - validate-check
      - validate-clippy
      - validate-test-compile
      - validate-sdk-types
      - validate-sdk-tests
    steps:
      - name: Fail closed if any release gate failed
        run: |
          test "${{ needs['validate-version'].result }}" = "success"
          test "${{ needs['validate-fmt'].result }}" = "success"
          test "${{ needs['validate-check'].result }}" = "success"
          test "${{ needs['validate-clippy'].result }}" = "success"
          test "${{ needs['validate-test-compile'].result }}" = "success"
          test "${{ needs['validate-sdk-types'].result }}" = "success"
          test "${{ needs['validate-sdk-tests'].result }}" = "success"

  build-macos-app:
    name: Build unsigned macOS app
    runs-on: macos-14
    needs: validate-version
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-release"
          cache-targets: false
          cache-all-crates: true

      - name: Cache cargo-bundle
        id: cache-cargo-bundle
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-bundle
          key: cargo-bundle-zed-deploy-v2-${{ runner.os }}

      - name: Install cargo-bundle
        if: steps.cache-cargo-bundle.outputs.cache-hit != 'true'
        run: cargo install cargo-bundle --git https://github.com/zed-industries/cargo-bundle.git --branch zed-deploy --locked

      - name: Verify cargo-bundle is available
        run: cargo bundle --help >/dev/null

      - name: Build release bundle
        run: cargo bundle --release --bin script-kit-gpui

      - name: Zip unsigned app bundle
        run: |
          cd target/release/bundle/osx
          /usr/bin/ditto -c -k --keepParent "Script Kit.app" "$RUNNER_TEMP/Script-Kit-unsigned-app.zip"

      - name: Upload unsigned app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-unsigned-app
          path: ${{ runner.temp }}/Script-Kit-unsigned-app.zip
          retention-days: 1

  build-pi-sidecar:
    name: Build Pi sidecar
    runs-on: macos-14
    needs: validate-version
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      PI_AGENT_RUST_REF: "3d1a3950c16ffdb10cd81780b26921c75c180770"
      PI_AGENT_RUST_STRICT_REF: "1"
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Pi sidecar Cargo target
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/pi_agent_rust-target
            ~/.cargo/registry
            ~/.cargo/git
          key: pi-sidecar-${{ runner.os }}-${{ runner.arch }}-${{ env.PI_AGENT_RUST_REF }}-${{ hashFiles('rust-toolchain.toml') }}

      - name: Prepare bundled Pi sidecar
        run: bash scripts/prepare-pi-sidecar.sh

      - name: Verify Pi sidecar
        run: |
          test -x target/pi-sidecar/pi
          file target/pi-sidecar/pi

      - name: Zip Pi sidecar
        run: |
          cd target/pi-sidecar
          /usr/bin/ditto -c -k pi "$RUNNER_TEMP/pi-sidecar.zip"

      - name: Upload Pi sidecar
        uses: actions/upload-artifact@v4
        with:
          name: pi-sidecar
          path: ${{ runner.temp }}/pi-sidecar.zip
          retention-days: 1

  sign-notarize-macos:
    name: Sign and notarize macOS app
    runs-on: macos-14
    needs:
      - validate-release-gates
      - build-macos-app
      - build-pi-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned app bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-unsigned-app
          path: artifacts/app

      - name: Restore unsigned app bundle
        run: |
          mkdir -p target/release/bundle/osx
          /usr/bin/ditto -x -k artifacts/app/Script-Kit-unsigned-app.zip target/release/bundle/osx

      - name: Download Pi sidecar
        uses: actions/download-artifact@v4
        with:
          name: pi-sidecar
          path: artifacts/pi

      - name: Restore Pi sidecar
        run: |
          mkdir -p target/pi-sidecar
          /usr/bin/ditto -x -k artifacts/pi/pi-sidecar.zip target/pi-sidecar
          chmod 0755 target/pi-sidecar/pi

      - name: Install Pi sidecar into bundle
        run: bash scripts/install-pi-sidecar-into-bundle.sh

      - name: Verify bundled macOS app contents
        run: bash scripts/verify-macos-bundle.sh

      - name: Create temporary keychain
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          # Decode certificate
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Store keychain path for later steps
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Sign with Developer ID
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
        run: |
          APP_PATH="target/release/bundle/osx/Script Kit.app"

          # Find the Developer ID Application identity
          IDENTITY="${APPLE_CODESIGN_IDENTITY:-Developer ID Application: John Lindquist ($APPLE_TEAM_ID)}"

          # Sign all nested components first (frameworks, helpers, etc.)
          find "$APP_PATH" -type d -name "*.framework" -print0 | xargs -0 -I{} codesign --force --options runtime --sign "$IDENTITY" "{}"
          find "$APP_PATH" \( -name "*.dylib" -o -name "*.so" \) -type f -print0 | xargs -0 codesign --force --options runtime --sign "$IDENTITY"

          # Sign bundled executables before the outer app bundle.
          codesign --force --options runtime --entitlements entitlements.plist --sign "$IDENTITY" "$APP_PATH/Contents/MacOS/pi"
          codesign --verify --verbose=4 "$APP_PATH/Contents/MacOS/pi"
          codesign --force --options runtime --entitlements entitlements.plist --sign "$IDENTITY" "$APP_PATH/Contents/MacOS/script-kit-gpui"

          # Sign the entire app bundle
          codesign --force --options runtime --entitlements entitlements.plist --sign "$IDENTITY" "$APP_PATH"

          # Verify signature
          codesign --verify --verbose=4 "$APP_PATH/Contents/MacOS/script-kit-gpui"
          codesign --verify --verbose=4 "$APP_PATH"

      - name: Create zip for notarization
        run: |
          cd target/release/bundle/osx
          /usr/bin/ditto -c -k --keepParent "Script Kit.app" "Script-Kit-macos.zip"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cd target/release/bundle/osx

          # Submit for notarization
          xcrun notarytool submit "Script-Kit-macos.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

      - name: Staple notarization ticket
        run: |
          xcrun stapler staple "target/release/bundle/osx/Script Kit.app"

          # Verify stapling
          xcrun stapler validate "target/release/bundle/osx/Script Kit.app"

      - name: Verify post-staple Gatekeeper acceptance
        run: spctl --assess --verbose=4 --type execute "target/release/bundle/osx/Script Kit.app"

      - name: Create final release zip
        run: |
          cd target/release/bundle/osx
          rm -f Script-Kit-macos.zip
          /usr/bin/ditto -c -k --keepParent "Script Kit.app" "Script-Kit-macos.zip"

      - name: Verify final release zip contents
        run: |
          TMP_DIR="$(mktemp -d)"
          /usr/bin/ditto -x -k "target/release/bundle/osx/Script-Kit-macos.zip" "$TMP_DIR"
          bash scripts/verify-macos-bundle.sh "$TMP_DIR/Script Kit.app"

      - name: Generate release manifest
        run: |
          cd target/release/bundle/osx
          ZIP="Script-Kit-macos.zip"
          SHA="$(shasum -a 256 "$ZIP" | awk '{print $1}')"
          SIZE="$(stat -f %z "$ZIP")"
          VERSION="$(grep -E '^version[[:space:]]*=' "$GITHUB_WORKSPACE/Cargo.toml" | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          cat > release-manifest.json <<MANIFEST
          {
            "version": "$VERSION",
            "tag": "$GITHUB_REF_NAME",
            "artifacts": [
              {
                "name": "$ZIP",
                "platform": "macos",
                "sha256": "$SHA",
                "size_bytes": $SIZE
              }
            ]
          }
          MANIFEST
          cat release-manifest.json

      - name: Cleanup keychain
        if: always()
        run: |
          if [ -n "$KEYCHAIN_PATH" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            target/release/bundle/osx/Script-Kit-macos.zip
            target/release/bundle/osx/release-manifest.json

  release:
    name: Create Release
    needs:
      - validate-release-gates
      - sign-notarize-macos
    if: >-
      ${{
        needs['validate-release-gates'].result == 'success' &&
        needs['sign-notarize-macos'].result == 'success'
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Script-Kit-macos.zip
            artifacts/release-manifest.json
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}
