name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cheap policy gate that runs on every PR, including the default fast path.
  source-audit-guard:
    name: No New App-Source Read Sites
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Fetch exact comparison base
        run: git cat-file -e "$BASE_SHA^{commit}" || git fetch --no-tags --depth=1 origin "$BASE_SHA"
      - name: Test source-audit scanner
        run: python3 -B -m unittest tests/source_audit_inventory_test.py
      - name: Check inventory and reject new app-source reads
        run: python3 -B tests/source_audit_inventory.py --check --base "$BASE_SHA"
      - name: Test hardcoded visual-value scanner
        run: python3 -B -m unittest tests/hardcoded_visual_inventory_test.py
      - name: Reject new hardcoded visual values
        run: python3 -B tests/hardcoded_visual_inventory.py --check --base "$BASE_SHA"
      - name: Test file-size ratchet
        run: python3 -B -m unittest tests/file_size_ratchet_test.py
      - name: Reject new or growing critical Rust files
        run: python3 -B tests/file_size_ratchet.py --base "$BASE_SHA"

  # ═══════════════════════════════════════════════════════════════════
  # FAST CI (default for PRs) - Target: <1 minute
  # Uses rust-cache only (faster for simple cargo check)
  # ═══════════════════════════════════════════════════════════════════

  # Fast format check (parallel with compile)
  fast-fmt:
    name: Format
    runs-on: macos-14
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'full-ci') && github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # Fast compile check (parallel with format)
  # Uses rust-cache only - faster than sccache for simple cargo check
  fast-compile:
    name: Compile
    runs-on: macos-14
    if: ${{ !contains(github.event.pull_request.labels.*.name, 'full-ci') && github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable

      # Full target directory cache - fastest for cargo check
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-debug"
          save-if: false

      # Check lib + binary only (not tests) - faster for PR feedback
      - name: Compile check
        run: cargo check

  # ═══════════════════════════════════════════════════════════════════
  # FULL CI (main branch or 'full-ci' label)
  # Uses sccache for incremental compilation benefits
  # ═══════════════════════════════════════════════════════════════════

  fmt:
    name: Format
    runs-on: macos-14
    if: ${{ contains(github.event.pull_request.labels.*.name, 'full-ci') || github.ref == 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  check:
    name: Check
    runs-on: macos-14
    if: ${{ contains(github.event.pull_request.labels.*.name, 'full-ci') || github.ref == 'refs/heads/main' }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-debug"
          cache-targets: false
          save-if: false
      - name: Check
        run: cargo check

  clippy:
    name: Clippy
    runs-on: macos-14
    if: ${{ contains(github.event.pull_request.labels.*.name, 'full-ci') || github.ref == 'refs/heads/main' }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-debug"
          cache-targets: false
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Lint app crate
        run: cargo clippy --locked --lib --no-deps -- -D warnings
      - name: Lint domain crates
        run: cargo clippy --locked -p sk-clipboard -p sk-protocol --all-targets -- -D warnings

  test:
    name: Test
    runs-on: macos-14
    if: ${{ contains(github.event.pull_request.labels.*.name, 'full-ci') || github.ref == 'refs/heads/main' }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      # Keep CI stable for known teardown races while allowing local parallel tests by default.
      RUST_TEST_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-debug"
          cache-targets: false
          save-if: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      # Actually RUN the suite (was previously --no-run / compile-only, which let
      # real failures through). RUST_TEST_THREADS=1 above sidesteps the Obj-C
      # teardown races that made parallel runs abort.
      - name: Run tests
        run: cargo test --locked
      - name: Run domain tests
        run: cargo test --locked -p sk-clipboard -p sk-protocol

  typescript-tests:
    name: TypeScript SDK Tests
    runs-on: macos-14
    if: ${{ contains(github.event.pull_request.labels.*.name, 'full-ci') || github.ref == 'refs/heads/main' }}
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4
      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable
      - uses: mozilla-actions/sccache-action@v0.0.9
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-debug"
          cache-targets: false
          save-if: false
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21
      - name: Install dependencies
        run: bun install
      - name: Check SDK types
        run: bun run scripts/check-sdk-types.ts
      - name: Build binary
        run: cargo build
      - name: Run TypeScript SDK tests
        run: bun run scripts/test-runner.ts --parallel
        timeout-minutes: 5

  # ═══════════════════════════════════════════════════════════════════
  # BUILD ARTIFACT (main branch only, after full validation passes)
  # ═══════════════════════════════════════════════════════════════════

  build-artifact-app:
    name: Build macOS App Intermediate
    runs-on: macos-14
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "macos-release"
          cache-targets: false
          cache-all-crates: true

      - name: Cache cargo-bundle
        id: cache-cargo-bundle
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-bundle
          key: cargo-bundle-zed-deploy-v2-${{ runner.os }}

      - name: Install cargo-bundle
        if: steps.cache-cargo-bundle.outputs.cache-hit != 'true'
        run: cargo install cargo-bundle --git https://github.com/zed-industries/cargo-bundle.git --branch zed-deploy --locked

      - name: Verify cargo-bundle is available
        run: cargo bundle --help >/dev/null

      - name: Build release bundle
        run: cargo bundle --release --bin script-kit-gpui

      - name: Zip unsigned app bundle
        run: |
          cd target/release/bundle/osx
          /usr/bin/ditto -c -k --keepParent "Script Kit.app" "$RUNNER_TEMP/ci-unsigned-app.zip"

      - name: Upload unsigned app bundle
        uses: actions/upload-artifact@v4
        with:
          name: ci-macos-unsigned-app
          path: ${{ runner.temp }}/ci-unsigned-app.zip
          retention-days: 1

  build-artifact-pi-sidecar:
    name: Build CI Pi Sidecar
    runs-on: macos-14
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"
      PI_AGENT_RUST_REF: "3d1a3950c16ffdb10cd81780b26921c75c180770"
      PI_AGENT_RUST_STRICT_REF: "1"
    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml at repo root pins the actual channel; this action installs whatever it asks for.
      - uses: dtolnay/rust-toolchain@stable

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache Pi sidecar Cargo target
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/pi_agent_rust-target
            ~/.cargo/registry
            ~/.cargo/git
          key: pi-sidecar-${{ runner.os }}-${{ runner.arch }}-${{ env.PI_AGENT_RUST_REF }}-${{ hashFiles('rust-toolchain.toml') }}

      - name: Prepare bundled Pi sidecar
        run: bash scripts/prepare-pi-sidecar.sh

      - name: Verify Pi sidecar
        run: |
          test -x target/pi-sidecar/pi
          file target/pi-sidecar/pi

      - name: Zip Pi sidecar
        run: |
          cd target/pi-sidecar
          /usr/bin/ditto -c -k pi "$RUNNER_TEMP/ci-pi-sidecar.zip"

      - name: Upload Pi sidecar
        uses: actions/upload-artifact@v4
        with:
          name: ci-pi-sidecar
          path: ${{ runner.temp }}/ci-pi-sidecar.zip
          retention-days: 1

  assemble-artifact:
    name: Assemble macOS Artifact
    runs-on: macos-14
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs:
      - fmt
      - check
      - clippy
      - test
      - typescript-tests
      - build-artifact-app
      - build-artifact-pi-sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Download unsigned app bundle
        uses: actions/download-artifact@v4
        with:
          name: ci-macos-unsigned-app
          path: artifacts/app

      - name: Restore unsigned app bundle
        run: |
          mkdir -p target/release/bundle/osx
          /usr/bin/ditto -x -k artifacts/app/ci-unsigned-app.zip target/release/bundle/osx

      - name: Download Pi sidecar
        uses: actions/download-artifact@v4
        with:
          name: ci-pi-sidecar
          path: artifacts/pi

      - name: Restore Pi sidecar
        run: |
          mkdir -p target/pi-sidecar
          /usr/bin/ditto -x -k artifacts/pi/ci-pi-sidecar.zip target/pi-sidecar
          chmod 0755 target/pi-sidecar/pi

      - name: Install Pi sidecar into bundle
        run: bash scripts/install-pi-sidecar-into-bundle.sh

      - name: Verify bundled macOS app contents
        run: bash scripts/verify-macos-bundle.sh

      - name: Ad-hoc sign for artifact
        run: codesign --force --deep --sign - "target/release/bundle/osx/Script Kit.app"

      - name: Create zip
        run: |
          cd target/release/bundle/osx
          zip -r Script-Kit-macos-dev.zip "Script Kit.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: script-kit-macos-${{ github.sha }}
          path: target/release/bundle/osx/Script-Kit-macos-dev.zip
          retention-days: 14
