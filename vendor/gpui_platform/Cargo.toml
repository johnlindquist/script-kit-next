[package]
name = "gpui_platform"
version = "0.1.0"
edition = "2024"
publish = false
license = "Apache-2.0"

[lib]
path = "src/gpui_platform.rs"

[features]
default = []
font-kit = ["gpui_macos/font-kit"]
test-support = ["gpui/test-support", "gpui_macos/test-support"]
screen-capture = ["gpui/screen-capture", "gpui_macos/screen-capture", "gpui_windows/screen-capture", "gpui_linux/screen-capture"]
runtime_shaders = ["gpui_macos/runtime_shaders"]
wayland = ["gpui_linux/wayland"]
x11 = ["gpui_linux/x11"]

[dependencies]
gpui = { path = "../gpui", default-features = false }

[target.'cfg(target_os = "macos")'.dependencies]
gpui_macos = { path = "../gpui_macos", default-features = false }

[target.'cfg(target_os = "windows")'.dependencies]
gpui_windows = { git = "https://github.com/zed-industries/zed", rev = "54a95e717d4ed1589c9b0e38648f65424defc74b", package = "gpui_windows", default-features = false }
gpui = { path = "../gpui", features = ["windows-manifest"] }

[target.'cfg(any(target_os = "linux", target_os = "freebsd"))'.dependencies]
gpui_linux = { git = "https://github.com/zed-industries/zed", rev = "54a95e717d4ed1589c9b0e38648f65424defc74b", package = "gpui_linux", default-features = false }
