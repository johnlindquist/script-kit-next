[package]
name = "gpui"
version = "0.2.2"
edition = "2024"
authors = ["Nathan Sobo <nathan@zed.dev>"]
description = "Zed's GPU-accelerated UI framework"
repository = "https://github.com/zed-industries/zed"
publish = true
license = "Apache-2.0"
homepage = "https://gpui.rs"
readme = "README.md"
keywords = ["desktop", "gui", "immediate"]
categories = ["gui"]

[features]
default = ["font-kit", "wayland", "x11", "windows-manifest"]
test-support = [
    "leak-detection",
    "collections/test-support",
    "util/test-support",
    "http_client/test-support",
    "wayland",
    "x11",
]
inspector = ["gpui_macros/inspector"]
leak-detection = ["backtrace"]
wayland = [
    "bitflags",
]
x11 = [
    "scap?/x11",
]
screen-capture = [
    "scap",
]
windows-manifest = []

[lib]
path = "src/gpui.rs"
doctest = false

[dependencies]
anyhow = "1.0.86"
async-task = "4.7"
backtrace = { version = "0.3", optional = true }
bitflags = { version = "2.6.0", optional = true }

collections = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "collections" }
ctor = "0.4.0"
derive_more = "0.99.17"
etagere = "0.2"
futures = "0.3"
gpui_macros = { path = "../gpui_macros" }
http_client = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "http_client" }
image = "0.25.1"
inventory = "0.3.19"
itertools = "0.14.0"
log = { version = "0.4.16", features = ["kv_unstable_serde", "serde"] }
num_cpus = "1.13"
parking = "2.0.0"
parking_lot = "0.12.1"
postage = { version = "0.5", features = ["futures-traits"] }
chrono = { version = "0.4", features = ["serde"] }
profiling = "1"
rand = "0.9"
raw-window-handle = "0.6"
refineable = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "refineable" }
scheduler = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "scheduler" }
resvg = { version = "0.45.0", default-features = false, features = [
    "text",
    "system-fonts",
    "memmap-fonts",
] }
usvg = { version = "0.45.0", default-features = false }
util_macros = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "util_macros" }
schemars = { version = "1.0", features = ["indexmap2"] }
seahash = "4.1"
serde = { version = "1.0.221", features = ["derive", "rc"] }
serde_json = { version = "1.0.144", features = ["preserve_order", "raw_value"] }
slotmap = "1.0.6"
smallvec = { version = "1.6", features = ["union", "const_new"] }
smol = "2.0"
stacksafe = "0.1"
strum = { version = "0.27.2", features = ["derive"] }
sum_tree = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "sum_tree" }
taffy = "=0.9.0"
thiserror = "2.0.12"
util = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "util" }
uuid = { version = "1.1.2", features = ["v4", "v5", "v7", "serde"] }
waker-fn = "1.2.0"
lyon = "1.0"
pin-project = "1.1.10"
circular-buffer = "1.0"
spin = "0.10.0"

[target.'cfg(target_os = "macos")'.dependencies]
block = "0.1"
cocoa = "=0.26.0"
cocoa-foundation = "=0.2.0"
core-foundation = "=0.10.0"
core-foundation-sys = "0.8.6"
core-graphics = "0.24"
core-video = { version = "0.5.2", features = ["metal"] }
core-text = "21"
# WARNING: If you change this, you must also publish a new version of zed-font-kit to crates.io
font-kit = { git = "https://github.com/zed-industries/font-kit", rev = "110523127440aefb11ce0cf280ae7c5071337ec5", package = "zed-font-kit", version = "0.14.1-zed", optional = true }
foreign-types = "0.5"
log = { version = "0.4.16", features = ["kv_unstable_serde", "serde"] }
media = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "media" }
objc = "0.2"
objc2 = { version = "0.6", optional = true }
objc2-metal = { version = "0.3", optional = true }
mach2 = "0.5"
#TODO: replace with "objc2"
metal = "0.33"

[target.'cfg(any(target_os = "linux", target_os = "freebsd", target_os = "macos"))'.dependencies]
pathfinder_geometry = "0.5"

[target.'cfg(any(target_os = "linux", target_os = "freebsd", target_os = "windows"))'.dependencies]
scap = { git = "https://github.com/zed-industries/scap", rev = "4afea48c3b002197176fb19cd0f9b180dd36eaac", default-features = false, package = "zed-scap", version = "0.0.8-zed", optional = true }

[target.'cfg(target_os = "windows")'.dependencies]
windows = { version = "0.61", features = ["Win32_Foundation"] }

[dev-dependencies]
backtrace = "0.3"
collections = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "collections", features = ["test-support"] }
env_logger = "0.11"
gpui_platform = { path = "../gpui_platform", default-features = false }
http_client = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "http_client", features = ["test-support"] }
lyon = { version = "1.0", features = ["extra"] }
pretty_assertions = { version = "1.3.0", features = ["unstable"] }
rand = "0.9"
reqwest_client = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "reqwest_client", features = ["test-support"] }
scheduler = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "scheduler", features = ["test-support"] }
unicode-segmentation = "1.10"
util = { git = "https://github.com/zed-industries/zed", rev = "8da83f8521d383c123d022455fac01f4f26ba0af", package = "util", features = ["test-support"] }

[target.'cfg(target_os = "windows")'.build-dependencies]
embed-resource = "3.0"

[target.'cfg(target_os = "macos")'.build-dependencies]
bindgen = "0.71"
cbindgen = { version = "0.28.0", default-features = false }
naga = { version = "28.0", features = ["wgsl-in"] }

[[example]]
name = "hello_world"
path = "examples/hello_world.rs"

[[example]]
name = "image"
path = "examples/image/image.rs"

[[example]]
name = "input"
path = "examples/input.rs"

[[example]]
name = "on_window_close_quit"
path = "examples/on_window_close_quit.rs"

[[example]]
name = "opacity"
path = "examples/opacity.rs"

[[example]]
name = "pattern"
path = "examples/pattern.rs"

[[example]]
name = "set_menus"
path = "examples/set_menus.rs"

[[example]]
name = "shadow"
path = "examples/shadow.rs"

[[example]]
name = "svg"
path = "examples/svg/svg.rs"

[[example]]
name = "tab_stop"
path = "examples/tab_stop.rs"

[[example]]
name = "text"
path = "examples/text.rs"

[[example]]
name = "text_wrapper"
path = "examples/text_wrapper.rs"

[[example]]
name = "tree"
path = "examples/tree.rs"

[[example]]
name = "uniform_list"
path = "examples/uniform_list.rs"

[[example]]
name = "window_shadow"
path = "examples/window_shadow.rs"

[[example]]
name = "grid_layout"
path = "examples/grid_layout.rs"

[[example]]
name = "mouse_pressure"
path = "examples/mouse_pressure.rs"
