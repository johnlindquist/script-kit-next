[profile.default]
# Fast feedback: ~12s for 10k+ tests. System API tests excluded (use --profile ci).
slow-timeout = { period = "5s", terminate-after = 2 }
fail-fast = false
default-filter = '''not (
    test(login_item::)
    | test(ocr::tests::)
    | test(agent_chat::client::)
    | test(template_variables::)
    | test(window_control::query::)
    | test(clipboard_history::change_detection::)
    | test(clipboard_history::macos_paste::)
    | test(clipboard_history::monitor::tests::test_capture)
    | test(hotkeys::tests::script_hotkey)
    | test(keyboard_monitor::)
    | test(keyword_manager::)
    | test(ai::window::window_api::)
    | test(permissions_wizard::)
    | test(platform::positioning_bounds)
    | test(platform::tests::test_get_global_mouse)
    | test(mcp_server::tests::)
    | test(actions::dialog_builtin_validation::)
    | test(ai::agent_chat::ui::tests::)
    | test(actions::builders_tests::global_actions_are_empty)
    | test(actions::core_tests::core_part_01::test_actions_exceed_visible_space)
    | test(actions::tests::core_part_01::test_actions_exceed_visible_space)
    | test(actions::dialog_cross_context_tests::script_action_count)
    | test(actions::dialog_cross_context_tests::scriptlet_action_count)
    | test(menu_syntax::action_effects::tests::copy_filter_in_command_state_reconstructs_head_plus_argv)
    | test(menu_syntax::action_effects::tests::edit_command_argv_resets_to_head_plus_space)
    | test(menu_syntax::main_hint::tests::command_composer_without_schema_omits_schema_rows)
    | test(menu_syntax::main_hint::tests::duplicate_command_warns)
    | test(menu_syntax::main_hint::tests::unknown_command_warns_without_shell_semantics)
    | test(menu_syntax::mode::tests::prefix_span_highlights_plus_capture)
    | test(menu_syntax::mode::tests::prefix_span_highlights_registered_capture_target)
    | test(menu_syntax::parse::tests::existing_triggers_return_none)
    | test(menu_syntax::parse::tests::demo_dynamic_capture_targets_parse_only_when_registered)
    | test(menu_syntax::parse::tests::unknown_plus_head_falls_back_to_normal_search)
    | test(menu_syntax_trigger_popup::tests::partial_plus_trigger)
    | test(menu_syntax_trigger_popup::tests::plus_partial_highlights_title_and_token_like_slash_picker)
    | test(notes::window::tests::test_notes_agent_chat_uses_shared_external_footer_renderer)
    | test(scripts::tests::test_frecency_change_invalidates_cache)
    | test(scripts::tests::test_frecency_cache_invalidation_required)
    | test(scripts::tests::test_fuzzy_search_by_path)
    | test(theme::tests::audit_selection_visibility_across_presets)
    | test(theme::tests::audit_app_chrome_surface_contrast)
    | binary(source_audits)
    | binary(tab_ai_routing)
    | binary(agent_chat_agent_switch_draft_contract)
    | binary(agent_chat_cancel_midstream_contract)
    | binary(agent_chat_dictation_keyboard_contract)
    | binary(agent_chat_hot_prewarm_contract)
    | binary(agent_chat_main_menu_skill_launch_contract)
    | binary(agent_chat_onboarding)
    | binary(agent_chat_surface_state_contract)
    | binary(agent_chat_switch_actions)
    | binary(actions_builtin_list_live_host_contract)
    | binary(builtin_execution)
    | binary(design_gallery_triggerbuiltin_contract)
    | binary(embedded_ai_window_agent_handoff_sites_contract)
    | binary(file_search_drag_and_verbs)
    | binary(file_search_mutation_refresh)
    | binary(filter_input_updates_reconciliation)
    | binary(gpui_vendor_cleanup_regressions)
    | binary(handle_action)
    | binary(menu_syntax_run11_attacker_pass28_capture_gate)
    | binary(menu_syntax_run11_attacker_pass32_action_effects)
    | binary(menu_syntax_run11_attacker_pass40_relative_and_range)
    | binary(menu_syntax_run12_attacker_pass12_stub_proposal_and_snapshot_field)
    | binary(menu_syntax_run12_attacker_pass4_target_examples_and_gate_hud)
    | binary(menu_syntax_text_entry_contract)
    | binary(mini_filter_reveal_contract)
    | binary(notes_ai_routing)
    | binary(scriptlist_choicecount_includes_skills_contract)
    | binary(set_filter_routes_to_active_subview_contract)
    | binary(startup_perf_event_driven)
    | binary(stdin_simulatekey_cmdk_fallback_contract)
)'''

# Serialize notes::storage tests — they share a global SQLite DB and
# the trigger-recreation test races with the trigger-assertion test.
[test-groups.notes-storage]
max-threads = 1

[test-groups.logging-capture]
max-threads = 1

[[profile.default.overrides]]
filter = 'test(notes::storage::)'
test-group = 'notes-storage'

[[profile.default.overrides]]
filter = 'test(logging::tests::test_toggle_capture_returns_correct_state) | test(logging::tests::test_capture_file_path_format)'
test-group = 'logging-capture'

[profile.ci]
# CI runs everything with generous timeouts
slow-timeout = { period = "120s", terminate-after = 3 }
fail-fast = false

[[profile.ci.overrides]]
filter = 'test(notes::storage::)'
test-group = 'notes-storage'

[[profile.ci.overrides]]
filter = 'test(logging::tests::test_toggle_capture_returns_correct_state) | test(logging::tests::test_capture_file_path_format)'
test-group = 'logging-capture'
