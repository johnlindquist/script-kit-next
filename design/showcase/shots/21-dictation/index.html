<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000}
.scene{
  position:relative;width:714px;height:266px;overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Helvetica Neue",sans-serif;
  -webkit-font-smoothing:antialiased;
  background:
    /* bottom-center blue glow along swoosh edge */
    radial-gradient(ellipse 220px 120px at 57% 108%, rgba(38,50,185,.65) 0%, rgba(38,50,185,0) 70%),
    /* blue glow top-right (light source hidden behind the swoosh) */
    radial-gradient(circle 300px at 790px 45px, #3d82d6 0%, #3877cc 30%, #2e66bd 48%, #1d4498 66%, rgba(15,35,110,.5) 82%, rgba(10,10,66,0) 96%),
    /* wider faint blue haze left of the blob */
    radial-gradient(ellipse 430px 240px at 108% 25%, rgba(28,62,170,.4) 0%, rgba(28,62,170,0) 78%),
    /* bottom-left purple brightening */
    radial-gradient(ellipse 300px 260px at -8% 120%, rgba(140,30,225,.4) 0%, rgba(140,30,225,0) 75%),
    /* purple band left edge */
    linear-gradient(94deg, #5514c9 0%, #3a0ab2 9%, #220691 17%, #100469 25%, #090549 32%, rgba(10,10,65,0) 40%),
    #0a0a41;
}
/* dark curved swoosh over the right/bottom: union of two soft circles */
.swoosh{
  position:absolute;left:-352px;top:-321px;width:4570px;height:4570px;
  border-radius:50%;
  background:#0f042e;
  filter:blur(5px);
}
.swoosh-top{
  position:absolute;left:540.5px;top:34px;width:441px;height:441px;
  border-radius:50%;
  background:#0f042e;
  filter:blur(5px);
}
.pink{
  position:absolute;left:656px;top:212px;width:120px;height:120px;
  border-radius:50%;
  background:radial-gradient(closest-side, rgb(205,82,160) 0%, rgb(152,58,124) 33%, rgba(70,25,55,.45) 63%, rgba(60,20,50,0) 100%);
}
.pill{
  position:absolute;left:98px;top:89.5px;width:519.5px;height:71.5px;
  border-radius:13px;
  border:1px solid rgba(255,255,255,.34);
  box-sizing:border-box;
  background:rgba(28,29,66,.75);
  -webkit-backdrop-filter:blur(28px);
  backdrop-filter:blur(28px);
  box-shadow:0 18px 34px rgba(0,0,0,.55);
  overflow:hidden;
  display:flex;flex-direction:column;
}
.pill-top{
  flex:0 0 39.5px;
  box-sizing:border-box;
  display:flex;align-items:center;
  padding:0 10px 5px 10.5px;
  position:relative;
}
.timer{
  font-size:12px;color:#e3e1ef;font-weight:400;
  font-variant-numeric:tabular-nums;
}
.wave{
  position:absolute;left:50%;top:calc(50% - 2.5px);transform:translate(-50%,-50%);
  display:flex;align-items:center;gap:3px;
}
.wave i{display:block;width:3px;border-radius:1.5px}
.icon-slot{
  margin-left:auto;
  width:39px;height:22px;border-radius:11px;
  background:rgba(0,0,0,.22);
  display:flex;align-items:center;justify-content:center;
}
.pill-bottom{
  flex:1;
  border-top:1px solid rgba(255,255,255,.13);
  background:rgba(36,36,56,.8);
  display:flex;align-items:center;
  padding:0 12px 0 18px;
  gap:0;
}
.keycap{
  width:19px;height:19px;border-radius:5.5px;
  border:1px solid rgba(255,255,255,.24);
  box-sizing:border-box;
  display:flex;align-items:center;justify-content:center;
  color:#d6d4e2;
  flex:none;
}
.keycap.txt{font-size:11px;font-weight:500;line-height:1}
.flabel{font-size:13px;font-weight:400;color:#d3d2e0;letter-spacing:.1px}
.f-left{display:flex;align-items:center;gap:4px}
.f-right{margin-left:auto;display:flex;align-items:center}
.f-right .flabel{margin-right:8px}
.kgroup{display:flex;align-items:center;gap:5px}
.cancel-label{margin-left:25px}
svg{display:block}
</style></head>
<body>
<div class="scene">
  <div class="swoosh"></div>
  <div class="swoosh-top"></div>
  <div class="pink"></div>

  <div class="pill">
    <div class="pill-top">
      <span class="timer" data-demo-key="timer">0:07</span>
      <div class="wave" data-demo-key="waveform">
        <i style="height:5px;background:#305a34"></i>
        <i style="height:7px;background:#325d32"></i>
        <i style="height:8px;background:#376e34"></i>
        <i style="height:10.5px;background:#438e33"></i>
        <i style="height:8px;background:#376c34"></i>
        <i style="height:7px;background:#325d32"></i>
        <i style="height:10px;background:#3b7a34"></i>
        <i style="height:6px;background:#305d36"></i>
        <i style="height:5px;background:#2f5c33"></i>
      </div>
      <div class="icon-slot">
        <!-- Finder icon approximation -->
        <svg width="17" height="17" viewBox="0 0 34 34">
          <defs>
            <linearGradient id="fL" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#8ec2f4"/><stop offset="1" stop-color="#4a86e0"/>
            </linearGradient>
            <linearGradient id="fR" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#5f9ceb"/><stop offset="1" stop-color="#2f66c8"/>
            </linearGradient>
          </defs>
          <rect x="1" y="1" width="32" height="32" rx="8" fill="url(#fR)"/>
          <path d="M9 1 h11 c-2.6 5 -4 10 -4 16 c0 6 1.4 11 4 16 H9 a8 8 0 0 1 -8 -8 V9 a8 8 0 0 1 8 -8 Z" fill="url(#fL)"/>
          <path d="M20 1 c-2.6 5 -4 10 -4 16 c0 6 1.4 11 4 16" fill="none" stroke="#1c3f86" stroke-width="1.6"/>
          <path d="M10.5 13.5 v4 M24 13.5 v4" stroke="#1c3f86" stroke-width="1.8" stroke-linecap="round"/>
          <path d="M6.5 23 c7 4.5 14 4.5 21 0" fill="none" stroke="#1c3f86" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="pill-bottom">
      <div class="f-left" data-demo-key="select-mic">
        <span class="keycap" style="width:20px;height:19.5px">
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#d6d4e2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
          </svg>
        </span>
        <span class="flabel">Select Mic</span>
      </div>
      <div class="f-right">
        <span class="flabel" data-demo-key="stop-label">Stop</span>
        <span class="kgroup">
          <span class="keycap">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#d6d4e2" stroke-width="2" stroke-linejoin="round">
              <path d="M12 3 4.5 11h4.5v8h6v-8h4.5L12 3Z"/>
            </svg>
          </span>
          <span class="keycap txt">&#8984;</span>
          <span class="keycap txt">;</span>
        </span>
        <span class="flabel cancel-label" data-demo-key="cancel-label">Cancel</span>
        <span class="keycap" style="margin-left:8px" data-demo-key="cancel-undo">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#d6d4e2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3.5 8.5A9 9 0 1 1 3 12"/>
            <path d="M3 4v4.5h4.5"/>
          </svg>
        </span>
      </div>
    </div>
  </div>
</div>
<script src="../../shared/fit.js"></script>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  if (params.get("demo") !== "1") return;
  const runner = document.createElement("script");
  runner.src = "../../shared/demo.js";
  runner.dataset.config = "./demo.js";
  document.head.appendChild(runner);
})();
</script>
</body></html>
