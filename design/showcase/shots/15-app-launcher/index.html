<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>15-app-launcher</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<link rel="stylesheet" href="../../shared/components.css">
<style>
html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }

.scene {
  position: relative;
  width: 838px;
  height: 570px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
}

/* ── Wallpaper (CSS approximation of the abstract macOS wallpaper) ────── */
.wallpaper {
  position: absolute;
  inset: 0;
  background:
    /* blue glow along top-right edge */
    radial-gradient(320px 150px at 92% -4%, rgb(46 100 195 / 0.98), rgb(28 62 158 / 0.6) 55%, transparent 82%),
    radial-gradient(150px 55px at 100.5% 0.5%, rgb(52 112 210), transparent 82%),
    /* dark pocket under the blue corner */
    radial-gradient(190px 150px at 104% 15%, rgb(14 4 38 / 0.85), transparent 75%),
    /* violet top-left flood */
    radial-gradient(460px 380px at -5% -8%, rgb(138 42 222 / 0.98), rgb(112 30 205 / 0.92) 40%, rgb(62 12 178 / 0.65) 64%, transparent 82%),
    /* left red-brown below the silver band */
    radial-gradient(180px 140px at -4% 70%, rgb(108 34 40 / 0.95), rgb(100 33 40 / 0.5) 55%, transparent 75%),
    /* left warming toward corner */
    radial-gradient(140px 95px at -4% 87%, rgb(135 68 45 / 0.92), transparent 72%),
    /* bottom-left orange corner */
    radial-gradient(210px 170px at -5% 104%, rgb(215 135 72 / 1), rgb(170 98 58 / 0.6) 55%, transparent 74%),
    /* right magenta mid band */
    radial-gradient(175px 130px at 101% 52%, rgb(205 88 162 / 1), rgb(178 68 138 / 0.75) 45%, rgb(150 55 110 / 0.4) 70%, transparent 90%),
    /* right bright purples lower */
    radial-gradient(170px 140px at 103% 72%, rgb(168 42 205 / 0.95), rgb(145 32 170 / 0.55) 55%, transparent 78%),
    radial-gradient(140px 105px at 103% 85%, rgb(148 30 168 / 0.92), transparent 75%),
    /* bottom-right magenta corner */
    radial-gradient(220px 160px at 101% 103%, rgb(202 74 202 / 0.95), rgb(160 35 175 / 0.55) 52%, transparent 72%),
    /* bottom deep purple lift near right */
    radial-gradient(240px 95px at 87% 104%, rgb(52 8 115 / 0.8), transparent 72%),
    /* hidden warm-purple field under the window: feeds the vibrancy bleed */
    radial-gradient(260px 480px at 12% 60%, rgb(135 38 160 / 0.5), transparent 72%),
    /* bottom darkening */
    linear-gradient(to bottom, transparent 58%, rgb(4 2 28 / 0.78) 94%),
    /* base: deep navy field */
    linear-gradient(100deg, rgb(55 14 135) 0%, rgb(16 8 85) 25%, rgb(9 9 62) 45%, rgb(10 8 56) 65%, rgb(16 5 45) 85%, rgb(18 5 48) 100%);
  background-color: rgb(8 8 50);
}

/* crisp diagonal band stack crossing the lower-left: pink ridge, crimson,
   dark gap, silver streak, dark under-edge */
.wallpaper::before {
  content: "";
  position: absolute;
  left: -150px;
  top: 166px;
  width: 380px;
  height: 300px;
  transform: rotate(42deg);
  background:
    linear-gradient(to bottom,
      transparent 0%,
      rgb(150 40 150 / 0.4) 10%,
      rgb(190 60 128 / 0.8) 22%,
      rgb(178 40 82 / 0.95) 30%,
      rgb(90 18 55 / 0.9) 38%,
      rgb(22 6 18 / 0.95) 44%,
      rgb(125 122 125 / 0.98) 54%,
      rgb(148 146 148) 59%,
      rgb(118 116 118 / 0.95) 65%,
      rgb(28 8 12 / 0.9) 74%,
      rgb(95 30 36 / 0.8) 84%,
      transparent 100%);
  filter: blur(2px);
}

/* crisp dark arc on the right edge between magenta and bright purple */
.wallpaper::after {
  content: "";
  position: absolute;
  right: -50px;
  top: 305px;
  width: 280px;
  height: 130px;
  transform: rotate(-36deg);
  background: linear-gradient(to bottom,
      transparent 0%,
      rgb(50 14 35 / 0.7) 32%,
      rgb(18 4 16 / 0.92) 48%,
      rgb(30 8 25 / 0.7) 62%,
      transparent 100%);
  filter: blur(2px);
}

/* ── Window ───────────────────────────────────────────────────────────── */
.launcher-window {
  position: absolute;
  left: 44.5px;
  top: 45px;
  width: 749px;
  height: 478.5px;
  border-radius: var(--sk-window-radius);
  overflow: clip;
  isolation: isolate;
  box-shadow:
    0 0 0 1px rgb(255 255 255 / 0.14),
    0 24px 60px rgb(0 0 0 / 0.55),
    0 8px 24px rgb(0 0 0 / 0.4);
}

.launcher-window .win-material {
  position: absolute;
  inset: 0;
  z-index: 0;
  -webkit-backdrop-filter: saturate(var(--sk-vibrancy-backdrop-saturation)) blur(32px);
  backdrop-filter: saturate(var(--sk-vibrancy-backdrop-saturation)) blur(32px);
  background: linear-gradient(rgb(58 58 38 / 0.55), rgb(52 52 34 / 0.55));
}

.launcher-window .win-tint {
  position: absolute;
  inset: 0;
  z-index: 1;
  background: var(--sk-window-vibrancy-tint);
}

.launcher-window .win-content {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  color: var(--sk-text-name);
}

/* ── Header: context zone + search ────────────────────────────────────── */
.hdr {
  flex: none;
  padding: 4px 2px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.context-zone {
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.cz-left {
  display: flex;
  align-items: center;
  padding-left: 18px;
  gap: 9px;
}

.cz-right {
  display: flex;
  align-items: center;
  padding-right: 12px;
  gap: 5px;
}

.cz-tilde {
  color: rgb(255 255 255 / 0.32);
  font-size: 12px;
  line-height: 1;
  transform: translateY(-1px);
}

.cz-chip {
  width: 18px;
  height: 16.5px;
  border: 1px solid rgb(255 255 255 / 0.13);
  border-radius: 5.5px;
  display: grid;
  place-items: center;
  color: rgb(255 255 255 / 0.38);
}

.cz-chip svg { display: block; }

.cz-model {
  color: rgb(255 255 255 / 0.5);
  font-size: 10.5px;
  line-height: 1;
  white-space: nowrap;
  margin-right: 1px;
}

/* ── Search shell ─────────────────────────────────────────────────────── */
.search-shell {
  position: relative;
  height: 26px;
  display: flex;
  align-items: center;
  padding-left: 18px;
  font-size: 18px;
  font-weight: 430;
  color: var(--sk-text-name);
}

.search-shell .query { white-space: pre; }

.search-shell .caret {
  width: 2.5px;
  height: 21px;
  margin-left: 1px;
  border-radius: 1px;
  background: var(--sk-text-name);
  flex: none;
}

/* ── List ─────────────────────────────────────────────────────────────── */
.list {
  flex: 1 1 auto;
  min-height: 0;
  overflow: hidden;
  padding-top: 4px;
  display: flex;
  flex-direction: column;
}

.app-row {
  width: 100%;
  height: var(--sk-main-menu-row-height);
  flex: none;
  padding: 0 var(--sk-main-menu-row-outer-padding-x);
}

.app-row .row-surface {
  width: 100%;
  height: 100%;
  padding: 4px 14px;
  border-radius: var(--sk-main-menu-row-radius);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--sk-main-menu-row-selected-background);
}

.app-row .app-name {
  color: var(--sk-text-name);
  font-size: 14px;
  font-weight: 500;
  line-height: 16px;
}

.app-icon-slot {
  position: relative;
  width: 20px;
  height: 20px;
  flex: none;
}

.app-icon-slot svg { display: block; }

.cursor-overlay {
  position: absolute;
  left: -4px;
  bottom: -3px;
}

/* ── Footer ───────────────────────────────────────────────────────────── */
.ftr {
  flex: none;
  height: 32px;
  padding-inline: var(--sk-footer-side-inset);
  display: flex;
  align-items: center;
  border-top: 1px solid rgb(255 255 255 / 0.07);
  background: rgb(255 255 255 / 0.035);
}

.ftr-spacer { flex: 1 1 auto; }

.ftr-action {
  height: 32px;
  flex: none;
  border-radius: var(--sk-footer-button-radius);
  padding-inline: 10px;
  display: flex;
  align-items: center;
  gap: 4px;
  color: var(--sk-footer-text);
}

.ftr-label {
  white-space: nowrap;
  font-size: 13px;
}

.kcap {
  min-width: 20px;
  height: 20px;
  border: 1px solid var(--sk-footer-keycap-border);
  border-radius: var(--sk-footer-keycap-radius);
  display: grid;
  place-items: center;
  color: var(--sk-footer-text);
  font-size: 11px;
  line-height: 1;
}

  /* demo support: [hidden] always wins; canonical .app-row is unconditionally
     "selected" (single-row frame), so the demo marks the real selection with
     data-state and gates a transparent override for the rest behind the
     strict ?demo=1 flag — the canonical rule/pixels never change. */
  [hidden] { display: none !important; }
  html[data-sk-demo="1"] .app-row:not([data-state="selected"]) .row-surface {
    background: transparent;
  }
</style>
</head>
<body>
<div class="scene">
  <div class="wallpaper"></div>

  <div class="launcher-window" data-verify-window>
    <div class="win-material"></div>
    <div class="win-tint"></div>
    <div class="win-content">

      <div class="hdr">
        <div class="context-zone">
          <div class="cz-left">
            <span class="cz-tilde">~</span>
            <span class="cz-chip">
              <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M0.8 4.5 H5.6 M3.6 2.2 L6 4.5 L3.6 6.8 M8 2 V7"/>
              </svg>
            </span>
          </div>
          <div class="cz-right">
            <span class="cz-model">Script Kit &middot; GPT-5.5</span>
            <span class="cz-chip">
              <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5 8 V3 M2.6 5 L5 2.6 L7.4 5 M3 8 H7"/>
              </svg>
            </span>
            <span class="cz-chip">
              <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M0.8 4.5 H5.6 M3.6 2.2 L6 4.5 L3.6 6.8 M8 2 V7"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="search-shell">
          <span class="query" data-demo-key="query">safari</span>
          <span class="caret"></span>
        </div>
      </div>

      <div class="list">
        <!-- demo-only: unfiltered launcher rows (hidden in the canonical frame) -->
        <div class="app-row" hidden data-demo-only data-demo-role="result" data-demo-key="codex" data-demo-match="codex">
          <div class="row-surface">
            <span class="app-icon-slot">
              <svg width="20" height="20" viewBox="0 0 20 20">
                <defs>
                  <linearGradient id="codexBg" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#3a3a3c"/>
                    <stop offset="1" stop-color="#131315"/>
                  </linearGradient>
                </defs>
                <rect x="0" y="0" width="20" height="20" rx="5.4" fill="url(#codexBg)"/>
                <path d="M5.5 7 L8.5 10 L5.5 13" fill="none" stroke="#f5f5f5" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                <line x1="10.5" y1="13" x2="14.5" y2="13" stroke="#f5f5f5" stroke-width="1.6" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="app-name">Codex</span>
          </div>
        </div>
        <div class="app-row" hidden data-demo-only data-demo-role="result" data-demo-key="finder" data-demo-match="finder">
          <div class="row-surface">
            <span class="app-icon-slot">
              <svg width="20" height="20" viewBox="0 0 20 20">
                <defs>
                  <linearGradient id="finderL" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#8fd3f4"/>
                    <stop offset="1" stop-color="#4a9fe0"/>
                  </linearGradient>
                  <linearGradient id="finderR" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#2f7fd6"/>
                    <stop offset="1" stop-color="#1c5aad"/>
                  </linearGradient>
                </defs>
                <rect x="0" y="0" width="20" height="20" rx="5.4" fill="url(#finderL)"/>
                <path d="M10 0 H14.6 A5.4 5.4 0 0 1 20 5.4 V14.6 A5.4 5.4 0 0 1 14.6 20 H10 Z" fill="url(#finderR)"/>
                <circle cx="6.5" cy="9" r="1" fill="#fff"/>
                <circle cx="13.2" cy="9" r="1" fill="#fff"/>
              </svg>
            </span>
            <span class="app-name">Finder</span>
          </div>
        </div>
        <div class="app-row" hidden data-demo-only data-demo-role="result" data-demo-key="textedit" data-demo-match="textedit">
          <div class="row-surface">
            <span class="app-icon-slot">
              <svg width="20" height="20" viewBox="0 0 20 20">
                <defs>
                  <linearGradient id="teBg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stop-color="#fdfdfd"/>
                    <stop offset="1" stop-color="#e4e6ea"/>
                  </linearGradient>
                </defs>
                <rect x="0" y="0" width="20" height="20" rx="5.4" fill="url(#teBg)"/>
                <line x1="5" y1="6.5" x2="15" y2="6.5" stroke="#4a7fd6" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="5" y1="10" x2="15" y2="10" stroke="#8891a0" stroke-width="1.4" stroke-linecap="round"/>
                <line x1="5" y1="13.5" x2="11.5" y2="13.5" stroke="#8891a0" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </span>
            <span class="app-name">TextEdit</span>
          </div>
        </div>
        <div class="app-row" hidden data-demo-only data-demo-role="result" data-demo-key="screen-sharing" data-demo-match="screen sharing">
          <div class="row-surface">
            <span class="app-icon-slot">
              <svg width="20" height="20" viewBox="0 0 20 20">
                <defs>
                  <linearGradient id="ssBg" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0" stop-color="#2b2b40"/>
                    <stop offset="1" stop-color="#111120"/>
                  </linearGradient>
                </defs>
                <rect x="0" y="0" width="20" height="20" rx="5.4" fill="url(#ssBg)"/>
                <rect x="4" y="5" width="12" height="8" rx="1.2" fill="none" stroke="#7fb8ff" stroke-width="1.3"/>
                <line x1="8" y1="15.5" x2="12" y2="15.5" stroke="#7fb8ff" stroke-width="1.3" stroke-linecap="round"/>
                <circle cx="10" cy="9" r="1.6" fill="#7fb8ff"/>
              </svg>
            </span>
            <span class="app-name">Screen Sharing</span>
          </div>
        </div>

        <!-- Safari (canonical selection) -->
        <div class="app-row" data-state="selected" data-demo-role="result" data-demo-key="safari" data-demo-match="safari">
          <div class="row-surface">
            <span class="app-icon-slot">
              <!-- Safari app icon approximation: gold-rim squircle, white face, blue compass -->
              <svg width="20" height="20" viewBox="0 0 20 20">
                <defs>
                  <linearGradient id="rim" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stop-color="#e8bd57"/>
                    <stop offset="1" stop-color="#cf9a34"/>
                  </linearGradient>
                  <radialGradient id="dial" cx="0.5" cy="0.35" r="0.75">
                    <stop offset="0" stop-color="#79b6f2"/>
                    <stop offset="0.55" stop-color="#4a8ce0"/>
                    <stop offset="1" stop-color="#3671cd"/>
                  </radialGradient>
                  <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0" stop-color="#fffdf6"/>
                    <stop offset="1" stop-color="#f4ead2"/>
                  </linearGradient>
                </defs>
                <rect x="0" y="0" width="20" height="20" rx="5.4" fill="url(#rim)"/>
                <rect x="1.7" y="1.7" width="16.6" height="16.6" rx="4.2" fill="url(#face)"/>
                <circle cx="10" cy="10" r="6.7" fill="url(#dial)"/>
                <!-- tick marks -->
                <g stroke="#eaf3ff" stroke-width="0.55">
                  <line x1="10" y1="3.9" x2="10" y2="5.1"/>
                  <line x1="10" y1="14.9" x2="10" y2="16.1"/>
                  <line x1="3.9" y1="10" x2="5.1" y2="10"/>
                  <line x1="14.9" y1="10" x2="16.1" y2="10"/>
                  <line x1="5.7" y1="5.7" x2="6.5" y2="6.5"/>
                  <line x1="13.5" y1="13.5" x2="14.3" y2="14.3"/>
                  <line x1="14.3" y1="5.7" x2="13.5" y2="6.5"/>
                  <line x1="6.5" y1="13.5" x2="5.7" y2="14.3"/>
                </g>
                <!-- needle: red NE half, white SW half -->
                <polygon points="14.2,5.8 11.1,11.1 8.9,8.9" fill="#e4453a"/>
                <polygon points="5.8,14.2 8.9,8.9 11.1,11.1" fill="#f6f6f6"/>
              </svg>
              <!-- mouse cursor caught in the capture -->
              <span class="cursor-overlay">
                <svg width="10" height="12" viewBox="0 0 10 12">
                  <path d="M1 1 L1 9.2 L3.1 7.4 L4.5 10.6 L6.1 9.9 L4.7 6.8 L7.6 6.6 Z"
                        fill="#111" stroke="#fff" stroke-width="0.9"/>
                </svg>
              </span>
            </span>
            <span class="app-name">Safari</span>
          </div>
        </div>
      </div>

      <div class="ftr">
        <div class="ftr-spacer"></div>
        <div class="ftr-action" style="margin-right: 14px;" data-demo-key="primary">
          <span class="ftr-label">Run</span>
          <span class="kcap">&#9166;</span>
        </div>
        <div class="ftr-action" data-demo-key="actions">
          <span class="ftr-label">Actions</span>
          <span class="kcap">&#8984;</span>
          <span class="kcap">K</span>
        </div>
      </div>

    </div>
  </div>
</div>
<script src="../../shared/fit.js"></script>
<script>
(() => {
  const params = new URLSearchParams(location.search);
  if (params.get("demo") !== "1") return;
  const runner = document.createElement("script");
  runner.src = "../../shared/demo.js";
  runner.dataset.config = "./demo.js";
  document.head.appendChild(runner);
})();
</script>
</body>
</html>
