<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>19-references</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
html, body { margin: 0; padding: 0; overflow: hidden; background: #000; }

.scene {
  position: relative;
  width: 787px;
  height: 168px;
  overflow: hidden;
  font-family: var(--sk-notes-editor-font-family, "JetBrains Mono"), ui-monospace, monospace;
}

/* ── Desktop wallpaper (visible sliver right of the window edge) ─────────
 * Abstract macOS-style wallpaper measured directly off the reference JPG:
 * a warm mauve-pink zone (brightest at the very top-right corner), cut by
 * one near-black diagonal band (centerline runs from ~(-3,168) to
 * ~(92,0) in wallpaper-local px, i.e. leans ~29.5deg off vertical), with
 * a vivid violet zone below/right of the band. There is no separate dark
 * "blob" in the reference — a previous draft invented one; the top-right
 * corner is in fact the single brightest point in the whole wallpaper. */
.wallpaper {
  position: absolute;
  left: 700px;
  top: 0;
  width: 87px;
  height: 168px;
  background: linear-gradient(119.5deg,
    rgb(42 26 48) 0%,
    rgb(69 27 70) 23%,
    rgb(103 43 96) 28%,
    rgb(130 53 113) 35%,
    rgb(144 52 122) 41%,
    rgb(145 48 128) 47%,
    rgb(67 27 59) 50%,
    rgb(14 3 10) 50.5%,
    rgb(36 6 41) 57%,
    rgb(27 4 35) 59%,
    rgb(44 8 51) 62%,
    rgb(114 28 135) 66%,
    rgb(136 33 162) 69%,
    rgb(148 36 176) 73%,
    rgb(153 36 183) 76%,
    rgb(137 32 168) 82%,
    rgb(118 24 146) 88%,
    rgb(127 25 157) 95%,
    rgb(130 27 162) 100%);
}

/* ── Day Page window (cropped: only its right portion is in frame) ──────
 * Fill = blurred wallpaper behind a translucent dark material; painted
 * directly as sampled gradients. Right edge carries the 1px light border
 * and a soft shadow onto the wallpaper. */
.window {
  position: absolute;
  top: -20px;
  bottom: -20px;
  left: -20px;
  width: 761px; /* right edge lands at x=740, border at 740..741 */
  border-right: 1px solid rgb(92 76 104);
  box-shadow: 3px 0 8px rgb(0 0 0 / 0.8);
  background:
    /* warm dim wash, bottom-left corner (ellipse center sits just below the
     * visible frame; large ry relative to frame height means the falloff
     * in-frame is dominated by the x radius, matching the measured x-only
     * falloff, while y still ramps in from ~0 effect at the top edge to
     * full strength by the bottom edge) */
    radial-gradient(200px 170px at 10px 190px, rgb(45 31 44) 0%, rgb(45 31 44) 55%, transparent 100%),
    /* purple ramp climbing from the bottom-right corner */
    radial-gradient(320px 145px at 104% 77%, rgb(60 27 80 / 0.8), rgb(58 27 78 / 0.28) 55%, transparent 80%),
    /* base: blurred-wallpaper drift, y-independent (window is cropped) */
    linear-gradient(90deg,
      rgb(66 27 77) 0,
      rgb(65 27 78) 95px,
      rgb(58 27 78) 170px,
      rgb(39 27 78) 270px,
      rgb(28 26 62) 330px,
      rgb(27 26 57) 370px,
      rgb(29 27 48) 470px,
      rgb(29 27 48) 640px,
      rgb(35 27 49) 715px,
      rgb(38 27 52) 761px);
}

/* ── Editor text (raw markdown, NotesEditor mono grid) ─────────────────── */
.editor {
  position: absolute;
  left: 61.5px;
  top: 6px;
  letter-spacing: 0.1px;
  font-size: var(--sk-notes-editor-font-size, 16px);
  line-height: var(--sk-notes-editor-line-box-height, 20px);
  color: var(--sk-notes-editor-text-color, rgb(255 255 255));
  font-weight: 400;
}
.editor .line { height: 20px; white-space: pre; }

.md-marker { color: var(--sk-notes-markdown-heading-marker-color, rgb(255 255 255)); }
.md-title {
  color: var(--sk-notes-markdown-title-color, rgb(251 191 36));
  font-weight: var(--sk-notes-markdown-title-font-weight, 700);
}
.link-label { color: var(--sk-notes-editor-link-label, rgb(251 191 36)); }
/* Destination rest color renders as accent blended toward white in the
 * capture (accent 35% over white ≈ rgb(253 233 178)); hardcoded to match. */
.link-dest { color: rgb(253 233 178); }

/* ── Brain-gold scrollbar thumb (top end runs out of frame) ────────────── */
.thumb {
  position: absolute;
  left: 712px;
  top: -8px;
  width: 6px;
  height: 154px;
  border-radius: 3px;
  background: rgb(157 123 53);
}
</style>
</head>
<body>
<div class="scene">
  <div class="wallpaper"></div>
  <div class="window"></div>
  <div class="editor">
    <div class="line"><span class="md-marker">##</span> <span class="md-title">Notes</span></div>
    <div class="line"></div>
    <div class="line">The clipboard &#8594; day page loop is finally invisible. Copied a link</div>
    <div class="line">twice yesterday and it was just *here* this morning. That's the</div>
    <div class="line">hero demo.</div>
    <div class="line"></div>
    <div class="line">00:05 [<span class="link-label">Clipboard entry</span>](<span class="link-dest">kit://clipboard-history</span></div>
    <div class="line"><span class="link-dest">?id=91a36280-01cc-4ca0-ae7a-9181468742f9</span>)</div>
  </div>
  <div class="thumb"></div>
</div>
<script src="../../shared/fit.js"></script>
</body>
</html>
