<!doctype html><html><head><meta charset="utf-8">
<title>Script Kit — quick terminal</title>
<link rel="stylesheet" href="../../shared/tokens.css">
<style>
html,body{margin:0;padding:0;overflow:hidden;background:#000}
.scene{position:relative;width:838px;height:570px;overflow:hidden;
  /* Wallpaper approximation (sampled from reference corners/edges) */
  background:
    radial-gradient(140px 80px at 101% -4%, rgb(5 5 25 / .95), transparent 70%),
    radial-gradient(470px 330px at -5% -8%, rgb(152 45 235), rgb(92 20 214 / .92) 45%, transparent 74%),
    radial-gradient(320px 240px at 102% 3%, rgb(46 102 198), rgb(25 56 158 / .75) 50%, transparent 78%),
    radial-gradient(150px 190px at 104% 27%, rgb(13 5 38 / .9), transparent 72%),
    radial-gradient(215px 130px at 102% 52%, rgb(192 64 132), transparent 72%),
    radial-gradient(120px 60px at 103% 61%, rgb(25 5 35 / .8), transparent 75%),
    radial-gradient(270px 250px at 103% 86%, rgb(180 28 205), rgb(134 25 154 / .55) 55%, transparent 80%),
    radial-gradient(200px 120px at 62% 101%, rgb(20 15 85 / .8), transparent 75%),
    radial-gradient(240px 130px at 29% 102%, rgb(52 50 52 / .85), transparent 70%),
    linear-gradient(105deg, rgb(66 13 140) 0%, rgb(18 8 82) 28%, rgb(9 7 66) 46%, rgb(9 9 66) 62%, rgb(14 15 92) 82%, rgb(32 64 168) 100%);
}
/* darken lower-middle like the reference */
.scene::before{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(560px 260px at 47% 108%, rgb(4 2 28 / .9), transparent 75%);}
/* left diagonal ribbon bands (photographic wallpaper approximation) */
.wall-left{position:absolute;left:0;top:0;width:72px;height:570px;pointer-events:none;
  background:linear-gradient(203deg,
    rgb(130 38 218) 0%, rgb(126 33 204) 12%, rgb(124 30 196) 22%,
    rgb(150 34 178) 30%, rgb(168 36 120) 38%, rgb(170 36 90) 43%,
    rgb(110 32 80) 47%, rgb(60 40 65) 50%, rgb(58 55 56) 53%,
    rgb(110 109 111) 59%, rgb(125 124 126) 62%, rgb(85 65 60) 66%,
    rgb(100 35 37) 70%, rgb(115 48 40) 78%, rgb(135 68 45) 86%,
    rgb(155 90 54) 93%, rgb(172 112 66) 100%);
  -webkit-mask-image:linear-gradient(to right,#000 55%,transparent 100%);
  mask-image:linear-gradient(to right,#000 55%,transparent 100%);}

/* ── window ─────────────────────────────────────────────────────────── */
.win{position:absolute;left:43.5px;top:44.5px;width:750px;height:480px;
  border-radius:10px;overflow:clip;isolation:isolate;
  border:1px solid rgb(255 255 255 / .30);
  box-shadow:0 25px 60px rgb(0 0 0 / .55), 0 8px 24px rgb(0 0 0 / .4);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;}
.win__material{position:absolute;inset:0;z-index:0;
  -webkit-backdrop-filter:blur(64px) saturate(1.2);
  backdrop-filter:blur(64px) saturate(1.2);
  background:
    radial-gradient(420px 300px at 4% -4%, rgb(152 58 158 / .60), transparent 70%),
    radial-gradient(380px 300px at 0% 96%, rgb(114 50 112 / .45), transparent 70%),
    radial-gradient(320px 200px at 100% 0%, rgb(34 40 102 / .45), transparent 72%),
    radial-gradient(300px 220px at 100% 100%, rgb(50 34 60 / .24), transparent 70%),
    rgb(30 29 53 / .88);}
.win__content{position:relative;z-index:1;width:100%;height:100%;}

/* ── header ─────────────────────────────────────────────────────────── */
.hdr-tilde{position:absolute;left:32px;top:11px;height:18px;line-height:18px;
  font-family:var(--sk-font-mono),ui-monospace,Menlo,monospace;font-size:13px;
  color:rgb(255 255 255 / .42);}
.hbtn{position:absolute;top:11.5px;width:17px;height:17px;border-radius:5.5px;
  border:1px solid rgb(255 255 255 / .17);display:grid;place-items:center;
  color:rgb(255 255 255 / .38);}
.hbtn svg{width:11px;height:11px;display:block}
.hbtn--l{left:52px}
.hbtn--r1{left:683px}
.hbtn--r2{left:704.5px}
.hdr-title{position:absolute;top:14.5px;right:73px;height:16px;line-height:16px;
  font-size:11.5px;letter-spacing:.1px;color:rgb(150 153 183 / .95);}

/* ── terminal grid ──────────────────────────────────────────────────── */
.term{position:absolute;left:6px;top:44px;margin:0;
  font-family:var(--sk-font-mono),ui-monospace,Menlo,monospace;
  font-size:var(--sk-terminal-font-size);
  line-height:var(--sk-terminal-cell-height);
  white-space:pre;color:#fff;font-weight:500;}
.g{color:rgb(150 242 165)}
.c{color:rgb(168 228 247)}
.cursor{display:inline-block;width:var(--sk-terminal-cell-width);
  height:var(--sk-terminal-cell-height);vertical-align:bottom;
  background:rgb(242 193 75);}
.arr{display:inline-block;width:var(--sk-terminal-cell-width);
  height:var(--sk-terminal-cell-height);vertical-align:bottom;color:rgb(150 242 165)}
.arr svg{width:100%;height:100%;display:block}

/* ── footer ─────────────────────────────────────────────────────────── */
.footer{position:absolute;left:0;right:0;bottom:0;height:30.5px;
  background:rgb(70 62 16 / .15);
  border-top:1px solid rgb(255 255 255 / .10);
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:24px;color:rgb(255 255 255 / .85);font-size:13px;}
.footer .lbl{margin-right:2px}
.kc{width:20px;height:19.5px;border-radius:6px;margin-left:4px;
  border:1px solid var(--sk-footer-keycap-border);
  display:grid;place-items:center;font-size:13px;line-height:1;
  color:rgb(255 255 255 / .85);}
.kc svg{width:12px;height:12px;display:block}
.grp+.grp{margin-left:22px}
.grp{display:flex;align-items:center}
</style></head>
<body><div class="scene">
  <div class="wall-left"></div>
  <div class="win">
    <div class="win__material"></div>
    <div class="win__content">
      <span class="hdr-tilde">~</span>
      <span class="hbtn hbtn--l"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8h8m0 0L7.2 4.7M10.5 8l-3.3 3.3M13.5 3.5v9"/></svg></span>
      <span class="hdr-title">Script Kit · GPT-5.5</span>
      <span class="hbtn hbtn--r1"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12.5v-8m0 0L4.5 8M8 4.5 11.5 8"/></svg></span>
      <span class="hbtn hbtn--r2"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M2.5 8h8m0 0L7.2 4.7M10.5 8l-3.3 3.3M13.5 3.5v9"/></svg></span>

      <pre class="term"><span class="arr"><svg viewBox="0 0 8.43 18.2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M0.9 9.1h6.4M4.6 5.8l2.9 3.3-2.9 3.3"/></svg></span>  <span class="c">~</span> ls ~/dev | head -14
acorn-mcp
acorn-mcp-deps
acorn-mcp-final
acorn-mcp-super-final
acp-group
activity
agenda
agendas
agent
agent-academy
agent-arena
agent-commands
agent-mail
agent-markers
<span class="arr"><svg viewBox="0 0 8.43 18.2" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M0.9 9.1h6.4M4.6 5.8l2.9 3.3-2.9 3.3"/></svg></span>  <span class="c">~</span> <span class="cursor"></span></pre>

      <div class="footer">
        <span class="grp"><span class="lbl">Agent</span><span class="kc"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5H4a2 2 0 1 1 2-2v1m5 1h1a2 2 0 1 0-2-2v1M5 11H4a2 2 0 1 0 2 2v-1m5-1h1a2 2 0 1 1-2 2v-1M5.5 5.5h5v5h-5z"/></svg></span><span class="kc"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M12.5 4v4.5H4m0 0 2.8-2.8M4 8.5l2.8 2.8"/></svg></span></span>
        <span class="grp"><span class="lbl">Close</span><span class="kc"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 5H4a2 2 0 1 1 2-2v1m5 1h1a2 2 0 1 0-2-2v1M5 11H4a2 2 0 1 0 2 2v-1m5-1h1a2 2 0 1 1-2 2v-1M5.5 5.5h5v5h-5z"/></svg></span><span class="kc">W</span></span>
      </div>
    </div>
  </div>
</div>
<script src="../../shared/fit.js"></script></body></html>
